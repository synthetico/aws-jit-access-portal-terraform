<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIT Access Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 80px; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .config { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 12px; }
        .config h3 { font-size: 14px; margin-bottom: 10px; color: #333; }
        .config input { font-size: 12px; padding: 8px; margin-bottom: 10px; }
        .helper-text { font-size: 12px; color: #666; margin-top: 5px; }
        .cognito-link { display: inline-block; margin-top: 15px; color: #667eea; text-decoration: none; font-size: 14px; }
        .cognito-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JIT Access Portal</h1>
        <p class="subtitle">Request temporary elevated AWS access</p>
        <div id="status" class="status"></div>
        <div class="config">
            <h3>API Configuration</h3>
            <input type="text" id="apiUrl" value="https://j0362geq43.execute-api.us-east-1.amazonaws.com">
        </div>
        <form id="accessForm">
            <div class="form-group">
                <label>Duration (hours)</label>
                <select id="duration" required>
                    <option value="1">1 hour</option>
                    <option value="2">2 hours</option>
                    <option value="4" selected>4 hours</option>
                    <option value="8">8 hours</option>
                    <option value="12">12 hours</option>
                </select>
            </div>
            <div class="form-group">
                <label>Justification</label>
                <textarea id="justification" required placeholder="Why do you need access?"></textarea>
                <div class="helper-text">Provide a business reason for this request</div>
            </div>
            <div class="form-group">
                <label>JWT Token (from Cognito)</label>
                <textarea id="token" required placeholder="Paste your Cognito ID token here"></textarea>
                <div class="helper-text">Get token from Cognito Hosted UI or CLI</div>
            </div>
            <button type="submit" class="btn">Request Access</button>
        </form>
        <a href="https://tdemy-jit-portal-935595346298.auth.us-east-1.amazoncognito.com/login?client_id=7ekm0frce3ldhhl0dg9p3ird0r&response_type=token&scope=openid+email+profile&redirect_uri=http://tdemy-jit-portal-frontend-935595346298.s3-website-us-east-1.amazonaws.com/" class="cognito-link" target="_blank">
            Get Token from Cognito Hosted UI →
        </a>
    </div>
    <script>
        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = `status ${type}`;
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 5000);
        }
        const hash = window.location.hash.substr(1);
        const params = new URLSearchParams(hash);
        const urlToken = params.get('id_token');
        if (urlToken) {
            document.getElementById('token').value = urlToken;
            showStatus('Token loaded from URL!', 'success');
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        document.getElementById('accessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const apiUrl = document.getElementById('apiUrl').value;
            const duration = document.getElementById('duration').value;
            const justification = document.getElementById('justification').value;
            const token = document.getElementById('token').value;
            showStatus('Submitting request...', 'info');
            try {
                const response = await fetch(`${apiUrl}/request-access`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        duration_hours: parseInt(duration),
                        justification: justification
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    showStatus('Request submitted! Manager will receive approval email.', 'success');
                    document.getElementById('justification').value = '';
                } else {
                    showStatus(`Error: ${data.error || 'Request failed'}`, 'error');
                }
            } catch (error) {
                showStatus(`Network error: ${error.message}`, 'error');
            }
        });
    </script>
</body>
</html>
