<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tdemy Academy - JIT Access Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .info-box p {
            color: #555;
            font-size: 13px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .alert.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .alert.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .response-details {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .response-details.show {
            display: block;
        }

        .response-details p {
            margin: 5px 0;
            font-size: 13px;
            color: #555;
        }

        .response-details strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to Tdemy Academy</h1>
            <p>JIT Access Portal</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="accessForm">
            <div class="info-box">
                <p><strong>Zero-Trust Just-In-Time Access</strong><br>
                Request temporary elevated permissions with automatic revocation.</p>
            </div>

            <div class="form-group">
                <label for="userId">User ID / Email *</label>
                <input type="text" id="userId" name="userId" required
                       placeholder="user@example.com or SSO User ID">
            </div>

            <div class="form-group">
                <label for="duration">Access Duration (hours) *</label>
                <select id="duration" name="duration" required>
                    <option value="1">1 hour</option>
                    <option value="2">2 hours</option>
                    <option value="4" selected>4 hours</option>
                    <option value="8">8 hours</option>
                    <option value="12">12 hours</option>
                </select>
            </div>

            <div class="form-group">
                <label for="justification">Justification *</label>
                <textarea id="justification" name="justification" required
                          placeholder="Provide a business justification for this access request..."></textarea>
            </div>

            <div class="info-box">
                <p><strong>Permission:</strong> AdministratorAccess<br>
                <strong>Auto-Revocation:</strong> Access will be automatically revoked when the duration expires.</p>
            </div>

            <button type="submit" id="submitBtn">Request Access</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing your request...</p>
            </div>

            <div class="response-details" id="responseDetails"></div>
        </form>
    </div>

    <script>
        const API_ENDPOINT = '${api_endpoint}';
        const form = document.getElementById('accessForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const alert = document.getElementById('alert');
        const responseDetails = document.getElementById('responseDetails');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset UI
            hideAlert();
            hideResponseDetails();
            showLoading();
            submitBtn.disabled = true;

            // Collect form data
            const formData = {
                user_id: document.getElementById('userId').value.trim(),
                duration_hours: parseInt(document.getElementById('duration').value),
                justification: document.getElementById('justification').value.trim()
            };

            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('Access granted successfully!');
                    displayResponseDetails(data);
                    form.reset();
                } else {
                    showError(data.error || 'Failed to grant access. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please check your connection and try again.');
            } finally {
                hideLoading();
                submitBtn.disabled = false;
            }
        });

        function showSuccess(message) {
            alert.textContent = message;
            alert.className = 'alert success show';
        }

        function showError(message) {
            alert.textContent = message;
            alert.className = 'alert error show';
        }

        function hideAlert() {
            alert.className = 'alert';
        }

        function showLoading() {
            loading.classList.add('show');
        }

        function hideLoading() {
            loading.classList.remove('show');
        }

        function displayResponseDetails(data) {
            const html = `
                <p><strong>Request ID:</strong> $${data.request_id}</p>
                <p><strong>User:</strong> $${data.user_id}</p>
                <p><strong>Duration:</strong> $${data.duration_hours} hours</p>
                <p><strong>Granted At:</strong> $${new Date(data.granted_at).toLocaleString()}</p>
                <p><strong>Expires At:</strong> $${new Date(data.expires_at).toLocaleString()}</p>
                <p style="margin-top: 10px; color: #667eea;">$${data.message}</p>
            `;
            responseDetails.innerHTML = html;
            responseDetails.classList.add('show');
        }

        function hideResponseDetails() {
            responseDetails.classList.remove('show');
        }
    </script>
</body>
</html>
